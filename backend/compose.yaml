services:
 
  postgres-db:
    image: docker.io/postgres:17.5
    container_name: desafio-tecnico-postgres-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: desafio-tecnico
    volumes:
      - .docker/postgres/data:/var/lib/postgresql/data

  
  

